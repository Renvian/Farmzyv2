<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign Up - Farmzy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo-container justify-center mb-4">
                <img id="main-logo" alt="Farmzy Logo" class="logo-img" style="width: 60px; height: 60px;">
            </div>
            <h2 class="text-center mb-4">Create Account</h2>
            <p class="text-center text-muted mb-4">Join the Farmzy platform today.</p>
            
            <label for="role">I am a...</label>
            <select id="role">
                <option value="user">Consumer (Looking to buy)</option>
                <option value="farmer">Farmer (Looking to sell)</option>
            </select>

            <label for="name">Full Name</label>
            <input type="text" id="name" placeholder="Enter your full name">
            
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            
            <label for="phone">Phone</label>
            <input type="tel" id="phone" placeholder="Enter your phone number">
            
            <label for="address">Delivery Address</label>
            <input type="text" id="address" placeholder="Enter your address">
            
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Create a strong password">
            
            <button onclick="signup()" class="mt-4">Sign Up</button>
            
            <div class="mt-4 text-center">
                <a href="login.html" class="link">Already have an account? Login</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="assets.js"></script>
    <script>
        async function signup() {
            const role = document.getElementById('role').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const name = document.getElementById('name').value;
            const phone = document.getElementById('phone').value;
            const address = document.getElementById('address').value;

            if (!email || !password || !name || !phone || !address) {
                showToast("Please fill in all fields.", "error");
                return;
            }

            // Show loading state
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Creating account...";
            btn.disabled = true;

            // 1. Create Auth User
            const { data: authData, error: authError } = await _supabase.auth.signUp({
                email, password
            });

            if (authError) {
                showToast(authError.message, "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
                return;
            }

            // 2. Create Profile
            const { error: profileError } = await _supabase
                .from('profiles')
                .insert([{ 
                    id: authData.user.id, 
                    role: role, 
                    name, phone, address 
                }]);

            if (profileError) {
                showToast("Error creating profile: " + profileError.message, "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                showToast("Signup successful! Redirecting...", "success");
                setTimeout(() => {
                    if (role === 'farmer') window.location.href = 'farmer.html';
                    else window.location.href = 'home.html';
                }, 1500);
            }
        }
    </script>
</body>
</html>
