<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Farmzy</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo-container justify-center mb-4">
                <img id="main-logo" alt="Farmzy Logo" class="logo-img" style="width: 60px; height: 60px;">
            </div>
            <h2 class="text-center mb-4">Welcome Back</h2>
            <p class="text-center text-muted mb-4">Log in to access your Farmzy account.</p>
            
            <label for="email">Email</label>
            <input type="email" id="email" placeholder="Enter your email">
            
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter your password">
            
            <button onclick="login()" class="mt-4">Login</button>
            
            <div class="mt-4 text-center flex-col">
                <a href="signup.html" class="link">New User? Sign Up</a>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="assets.js"></script>
    <script>
        async function login() {
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (!email || !password) {
                showToast("Please enter both email and password.", "error");
                return;
            }
            
            // Show loading state
            const btn = document.querySelector('button');
            const originalText = btn.innerHTML;
            btn.innerHTML = "Logging in...";
            btn.disabled = true;

            const { data, error } = await _supabase.auth.signInWithPassword({ email, password });
            
            if (error) {
                showToast(error.message, "error");
                btn.innerHTML = originalText;
                btn.disabled = false;
            } else {
                // Determine redirect based on role
                const { data: profile } = await _supabase
                    .from('profiles').select('role').eq('id', data.user.id).single();
                
                showToast("Login successful!", "success");
                
                setTimeout(() => {
                    if (profile && profile.role === 'admin') window.location.href = 'admin.html';
                    else if (profile && profile.role === 'farmer') window.location.href = 'farmer.html';
                    else window.location.href = 'home.html';
                }, 1000);
            }
        }
    </script>
</body>
</html>
